<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetStreak — All Done!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); padding: 40px 36px; max-width: 480px; width: 100%; text-align: center; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 26px; color: #2d3436; margin-bottom: 12px; }
    p { font-size: 15px; color: #636e72; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏆</div>
    <h1>You finished all 350!</h1>
    <p>You've solved every question in the LeetCode 350. That's a serious achievement.<br><br>
    Review mode is coming soon. Take a break — you've earned it.</p>
  </div>
</body>
</html>
